name: Release

# Tag-driven release. Cut a release like this:
#   1. bump "version" in extension/manifest.json
#   2. move [Unreleased] items into a dated [x.y.z] section in CHANGELOG.md
#   3. commit, then:  git tag vX.Y.Z && git push origin vX.Y.Z
# This workflow then runs the tests, verifies the tag matches the manifest,
# builds the package, and publishes a GitHub Release with the zip + changelog notes.
#
# Chrome Web Store auto-publish is DORMANT: the final step is skipped until the
# CWS_* secrets are set (repo Settings → Secrets and variables → Actions). Add them
# after registering the developer account and it lights up — no edit to this file.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v1.0.0'
        required: true
      dry_run:
        description: 'Dry run — test, build, and validate CWS credentials, but do NOT create a release or publish anything'
        type: boolean
        default: false

permissions:
  contents: write   # create the GitHub Release + upload the zip asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Test (gate — no release on red)
        run: node --test tests/*.test.js

      - name: Resolve version and tag
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="$(grep -m1 '"version"' extension/manifest.json | sed -E 's/.*"version" *: *"([^"]+)".*/\1/')"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Guard — tag must match manifest version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          expected="v$VERSION"
          if [ "$TAG" != "$expected" ]; then
            echo "::error::Tag '$TAG' does not match manifest version '$expected' (extension/manifest.json). Bump the manifest or retag."
            exit 1
          fi

      - name: Build package
        run: ./scripts/pack.sh

      - name: Extract changelog section for this version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { grab=1; next }
            grab && /^## \[/ { exit }
            grab && /^\[[^]]+\]: / { next }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then echo "Release v$VERSION" > release-notes.md; fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ypuf-${{ steps.ver.outputs.version }}
          path: dist/ypuf-${{ steps.ver.outputs.version }}.zip

      # ---- Chrome Web Store credentials (dormant until CWS_* secrets exist) ----
      - name: Check for Chrome Web Store credentials
        id: cws
        env:
          HAS_CWS: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          if [ -n "$HAS_CWS" ]; then echo "ready=true" >> "$GITHUB_OUTPUT"; else echo "ready=false (set CWS_* secrets to enable)"; echo "ready=false" >> "$GITHUB_OUTPUT"; fi

      # ---- DRY RUN: prove the four secrets work, without uploading or publishing ----
      - name: Validate CWS credentials (dry run)
        if: ${{ inputs.dry_run && steps.cws.outputs.ready == 'true' }}
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          echo "Exchanging refresh token for an access token…"
          resp="$(curl -sS -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" -d grant_type=refresh_token)"
          token="$(printf '%s' "$resp" | jq -r '.access_token // empty')"
          if [ -z "$token" ]; then
            echo "::error::No access token — check CWS_CLIENT_ID / CWS_CLIENT_SECRET / CWS_REFRESH_TOKEN."
            printf '%s' "$resp" | jq -r '.error_description // .error // "unknown error"'
            exit 1
          fi
          echo "✓ refresh token + client are valid (access token obtained)."
          echo "Querying the item to confirm CWS_EXTENSION_ID + scope…"
          code="$(curl -sS -o item.json -w '%{http_code}' \
            -H "Authorization: Bearer $token" -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID?projection=DRAFT")"
          echo "Item query → HTTP $code"; cat item.json; echo
          if [ "$code" != "200" ]; then
            echo "::error::Item query failed (HTTP $code) — check CWS_EXTENSION_ID and that this Google account owns the item."
            exit 1
          fi
          echo "✓ All four secrets valid and the item is reachable. A version-tag run would publish."

      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ypuf ${{ steps.ver.outputs.tag }}
          body_path: release-notes.md          # curated CHANGELOG section…
          generate_release_notes: true         # …plus an auto "What's Changed" commit/PR list appended below
          files: dist/ypuf-${{ steps.ver.outputs.version }}.zip
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}

      # ---- Chrome Web Store auto-publish — real runs only, when creds exist ----
      - name: Publish to the Chrome Web Store
        if: ${{ !inputs.dry_run && steps.cws.outputs.ready == 'true' }}
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: dist/ypuf-${{ steps.ver.outputs.version }}.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true
