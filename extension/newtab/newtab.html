<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="../lib/theme-preinit.js"></script>
  <link rel="icon" id="favicon" href="../icons/ypuf-mark.svg" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="newtab.css" />
  <title>ypuf</title>
</head>
<body class="board">
  <canvas id="starfield" hidden aria-hidden="true"></canvas>
  <main class="board-main">
    <header class="board-head">
      <div class="board-brand">
        <span class="board-title">
          <svg class="puff-mark" viewBox="0 0 16 16" aria-hidden="true"><g fill="currentColor"><circle cx="5.3" cy="10.7" r="3.5"/><circle cx="9.7" cy="7.3" r="1.75" opacity="0.72"/><circle cx="12.3" cy="4.9" r="1.05" opacity="0.5"/><circle cx="14" cy="3.2" r="0.62" opacity="0.32"/></g></svg>
          <span class="wordmark">ypuf</span>
        </span>
        <span class="board-sub" id="board-sub"></span>
      </div>
      <div class="board-actions">
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Theme"></button>
        <button class="board-edit" id="board-settings" type="button" hidden></button>
        <button class="board-edit" id="board-edit" type="button" hidden>Edit board</button>
      </div>
    </header>

    <div class="board-grid" id="board-grid" aria-label="Your panel board"></div>
    <p class="board-empty" id="board-empty" hidden>A calm board. Add a panel to begin.</p>
    <button class="add-panel" id="add-panel" type="button" hidden>+ add a panel</button>
    <p class="minimal-note" id="minimal-note" hidden></p>
    <footer class="board-oneline" id="board-oneline" hidden></footer>
  </main>

  <script src="../lib/attribution.js"></script>
  <script src="../lib/shelf-render.js"></script>
  <script src="../lib/timegroup.js"></script>
  <script src="../lib/returnwindow.js"></script>
  <script src="../lib/sourceurl.js"></script>
  <script src="../lib/channel.js"></script>
  <script src="../lib/lanes.js"></script>
  <script src="../lib/rss.js"></script>
  <script src="../lib/cryptoProvider.js"></script>
  <script src="../lib/oneline.js"></script>
  <script src="../lib/eagerness.js"></script>
  <script src="../lib/boardkeys.js"></script>
  <script src="../lib/hints.js"></script>
  <script src="../lib/theme.js"></script>
  <script src="../lib/moonphase.js"></script>
  <script src="../lib/moonrender.js"></script>
  <script src="../lib/starfield.js"></script>
  <script src="../lib/barometer.js"></script>
  <script src="../lib/puffscene.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
